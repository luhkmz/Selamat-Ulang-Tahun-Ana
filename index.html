<<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy 21st Birthday Anaa!</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap');

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #fce4ec 0%, #f8bbd0 100%);
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
        }

        /* Latar Belakang Animasi Glitter */
        .particles {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        /* Kartu Utama */
        .card {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            padding: 3rem;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            text-align: center;
            border: 2px solid #ffffff;
            max-width: 400px;
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 3.5rem;
            color: #d81b60;
            margin-bottom: 0.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.05);
        }

        .age {
            font-size: 5rem;
            font-weight: 600;
            background: linear-gradient(45deg, #ad1457, #f06292);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
            line-height: 1;
        }

        p {
            color: #880e4f;
            font-size: 1.1rem;
            line-height: 1.6;
            margin-top: 20px;
        }

        .decoration {
            font-size: 2rem;
            margin: 15px 0;
        }

        .btn {
            margin-top: 25px;
            padding: 12px 30px;
            background: #d81b60;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.3s;
            text-decoration: none;
            display: inline-block;
        }

        .btn:hover {
            background: #ad1457;
            transform: scale(1.05);
            box-shadow: 0 10px 20px rgba(216, 27, 96, 0.3);
        }

        /* Kelopak Bunga Berjatuhan */
        .petal {
            position: absolute;
            background-color: #ffc0cb;
            border-radius: 150% 0 150% 0;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="particles" id="particles"></div>

    <div class="card">
        <div class="decoration">✨🌸✨</div>
        <h1>Happy Birthday</h1>
        <p style="font-weight: 600; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 0;">Dear,</p>
        <h1 style="font-size: 4rem; margin-top: 0;">Anaa</h1>
        <div class="age">21</div>
        <p>Semoga di usia yang ke-21 ini, harimu penuh dengan tawa, hatimu penuh dengan cinta, dan impianmu menjadi nyata. Kamu berharga!</p>
        <div class="decoration">🎂✨🎁</div>
        <a href="#" class="btn" onclick="celebrate()">Klik untuk Kejutan</a>
    </div>

    <script>
        function createPetal() {
            const petal = document.createElement('div');
            petal.classList.add('petal');
            petal.style.left = Math.random() * 100 + 'vw';
            petal.style.width = Math.random() * 15 + 10 + 'px';
            petal.style.height = petal.style.width;
            petal.style.animationDuration = Math.random() * 3 + 2 + 's';
            petal.style.opacity = Math.random();
            
            document.getElementById('particles').appendChild(petal);

            setTimeout(() => {
                petal.remove();
            }, 5000);
        }

        setInterval(createPetal, 300);

        function celebrate() {
            alert("Happy Level 21, Anaa! Teruslah bersinar! ✨💖");
            for(let i=0; i<50; i++) {
                setTimeout(createPetal, i * 50);
            }
        }
    </script>
</body>
</html>
